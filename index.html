<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my girlfriend?</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastelPink: '#ffd1dc',
                        pastelPurple: '#e6e6fa',
                        softCream: '#fdfbf7',
                        primary: '#ff6b81',
                        primaryHover: '#ff4766'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(255,107,129,0.3)',
                    }
                }
            }
        }
    </script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #ffd1dc 0%, #e6e6fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            padding: 1rem;
        }

        .card-enter {
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Evasive button specific styles */
        #noBtn {
            transition: all 0.2s ease-out;
            position: relative; /* Default position before interaction */
        }
    </style>
</head>
<body>

    <!-- Main Container -->
    <div id="appContainer" class="relative w-full max-w-md mx-auto">
        
        <!-- Proposal Screen -->
        <div id="proposalScreen" class="bg-white/80 backdrop-blur-md rounded-3xl p-8 shadow-soft text-center card-enter border border-white/50">
            <div class="mb-6 flex justify-center">
                <img src="assets/cute_cat.png" alt="Cute Cat with Heart" class="w-48 h-48 object-cover rounded-2xl shadow-sm border-4 border-white">
            </div>
            
            <h1 class="text-3xl font-extrabold text-gray-800 mb-8 leading-tight">
                Harini (Harini Vishnu in Future),<br>
                <span class="text-primary">will you be my girlfriend?</span>
            </h1>

            <div class="flex flex-row items-center justify-center gap-4 mb-6 min-h-[60px]" id="buttonContainer">
                <button id="yesBtn" class="bg-primary text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-primaryHover hover:shadow-xl hover:-translate-y-1 transition-all duration-300 transform">
                    Yes! 💖
                </button>
                <button id="noBtn" class="bg-gray-200 text-gray-700 font-bold py-3 px-8 rounded-full shadow hover:bg-gray-300 transition-colors z-50">
                    No
                </button>
            </div>

            <p id="subtitle" class="text-gray-500 font-medium h-6 transition-opacity duration-300">
                <!-- Subtitle will appear here -->
            </p>
        </div>

        <!-- Success Screen -->
        <div id="successScreen" class="hidden bg-white/80 backdrop-blur-md rounded-3xl p-8 shadow-soft text-center border border-white/50">
            <div class="mb-6 flex justify-center">
                <img src="assets/celebration.png" alt="Happy Couple Celebrating" class="w-56 h-56 object-cover rounded-2xl shadow-sm border-4 border-white">
            </div>
            
            <h1 class="text-4xl font-extrabold text-primary mb-3">
                Yayyy! You said YES! 💖
            </h1>
            
            <p class="text-lg text-gray-600 font-semibold mb-2">
                Knew you'd say yes 😏
            </p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
